# Example config — no secrets. Normative rules: PLANNED_INTERFACE.md §3–§4, §8.1 (not this file).
# Copy to ~/.config/api-spend/config.yaml or set API_SPEND_CONFIG (§8.1).
#
# Credential env var names (authoritative list §8.1):
#   openai        → API_SPEND_OPENAI_API_KEY
#   anthropic     → API_SPEND_ANTHROPIC_API_KEY
#   brightdata    → API_SPEND_BRIGHTDATA_API_KEY
#   resend        → API_SPEND_RESEND_API_KEY
#   brave_search  → API_SPEND_BRAVE_API_KEY
# Note: YAML name brave_search maps to API_SPEND_BRAVE_API_KEY (not ...BRAVE_SEARCH...).
#
# Remove unused provider blocks. Agents: README “For coding agents”; SoT PLANNED_INTERFACE.md §0.

sync:
  lookback_days: 60 # first billing sync backfill window (days); default 60 if omitted

providers:
  # Billing API — Administrator key + org id (Costs API).
  - name: openai
    options:
      organization_id: org-xxxxxxxx # required; OpenAI-Organization header (§3.1)

  # Billing API — Admin key only (sk-ant-admin…); no YAML options.
  - name: anthropic

  # Billing API — zone id for GET /zone/cost.
  - name: brightdata
    options:
      zone: my_zone # required

  # Snapshot — usage from GET /emails + plan-based $/email (or override per_email_usd).
  - name: resend
    options:
      plan: pro # "pro" | "free", or set per_email_usd for a custom rate
      # per_email_usd: 0.0004 # optional; if set, overrides plan-based default

  # Snapshot — $5/1000 requests (fixed); no options required.
  - name: brave_search
